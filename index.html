<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Weave Binary Generator</title>
  <style>
    body { font-family: Arial, Helvetica, sans-serif; padding: 18px; max-width: 900px; }
    label { display:block; margin-top:10px; }
    textarea { width:100%; height:100px; font-family:monospace; }
    .controls { display:flex; gap:10px; align-items:center; margin-top:8px; flex-wrap:wrap; }
    canvas { border:1px solid #ccc; margin-top:12px; image-rendering:pixelated; }
    button { padding:6px 10px; }
  </style>
</head>
<body>
  <h2>Weave Binary Generator</h2>
  <label>Message (text only)
    <textarea id="message">Type your message you wish to preserve here...</textarea>
  </label>

  <div class="controls">
    <label>Columns: <input id="cols" type="number" value="32" min="1" style="width:80px"></label>
    <label>Cell size (px): <input id="cell" type="number" value="8" min="1" style="width:80px"></label>
    <label>Bits/char: 
      <select id="bits">
        <option value="8" selected>8</option>
        <option value="7">7</option>
      </select>
    </label>
    <label><input id="invert" type="checkbox"> invert (1→white)</label>
    <button id="gen">Generate</button>
    <button id="download">Download PNG</button>
  </div>

  <canvas id="pattern"></canvas>

  <hr style="margin: 40px 0;">

  <h2>Weave Binary Scanner</h2>
  <p>Use your device's camera to scan a binary pattern and translate it back to text.</p>
  
  <div class="controls">
    <button id="startCamera">Start Camera</button>
    <button id="capturePhoto" style="display:none;">Capture Photo</button>
    <button id="stopCamera" style="display:none;">Stop Camera</button>
    <label>Bits/char: 
      <select id="scanBits">
        <option value="8" selected>8</option>
        <option value="7">7</option>
      </select>
    </label>
    <label>Cell size (px): <input id="scanCell" type="number" value="8" min="1" style="width:80px"></label>
  </div>

  <div id="cameraContainer" style="display:none; margin-top:12px;">
    <video id="cameraFeed" style="border:1px solid #ccc; max-width:100%; height:auto;"></video>
    <canvas id="scanCanvas" style="display:none;"></canvas>
  </div>

  <label style="margin-top:12px; display:block;">
    Scanned Binary:
    <textarea id="scannedBinary" readonly style="height:60px;"></textarea>
  </label>

  <label>
    Decoded Text:
    <textarea id="decodedText" readonly style="height:100px;"></textarea>
  </label>

  <script>
    function textToBinary(text, bitsPerChar = 8) {
      const arr = [];
      for (let i = 0; i < text.length; i++) {
        const code = text.charCodeAt(i);
        let b = code.toString(2);
        if (b.length > bitsPerChar) b = b.slice(-bitsPerChar);
        else b = b.padStart(bitsPerChar, '0');
        arr.push(b);
      }
      return arr.join('');
    }

    function chunkString(str, size) {
      const chunks = [];
      for (let i = 0; i < str.length; i += size) chunks.push(str.slice(i, i + size));
      return chunks;
    }

    function renderBinaryGrid(binary, cols, cellSize, invert=false) {
      const rows = Math.ceil(binary.length / cols);
      const canvas = document.getElementById('pattern');
      canvas.width = cols * cellSize;
      canvas.height = rows * cellSize;
      const ctx = canvas.getContext('2d');

      // Fill background white (or black if invert)
      ctx.fillStyle = invert ? '#fff' : '#fff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (let i = 0; i < binary.length; i++) {
        const bit = binary[i];
        const x = (i % cols) * cellSize;
        const y = Math.floor(i / cols) * cellSize;
        const on = bit === '1';
        // If invert checked, flip color mapping
        ctx.fillStyle = (on ^ invert) ? '#000' : '#fff';
        ctx.fillRect(x, y, cellSize, cellSize);
      }
    }

    document.getElementById('gen').addEventListener('click', () => {
      const msg = document.getElementById('message').value;
      const cols = Math.max(1, parseInt(document.getElementById('cols').value) || 32);
      const cell = Math.max(1, parseInt(document.getElementById('cell').value) || 8);
      const bits = parseInt(document.getElementById('bits').value, 10) || 8;
      const invert = document.getElementById('invert').checked;

      const binary = textToBinary(msg, bits);
      renderBinaryGrid(binary, cols, cell, invert);
    });

    document.getElementById('download').addEventListener('click', () => {
      const canvas = document.getElementById('pattern');
      const url = canvas.toDataURL('image/png');
      const a = document.createElement('a');
      a.href = url;
      a.download = 'weave.png';
      a.click();
    });

    // auto-generate initial
    document.getElementById('gen').click();

    // ==================== SCANNER SECTION ====================
    let videoStream = null;

    function binaryToText(binary, bitsPerChar = 8) {
      const text = [];
      for (let i = 0; i < binary.length; i += bitsPerChar) {
        const chunk = binary.slice(i, i + bitsPerChar);
        if (chunk.length === bitsPerChar) {
          const code = parseInt(chunk, 2);
          if (code >= 0 && code <= 127) {
            text.push(String.fromCharCode(code));
          }
        }
      }
      return text.join('');
    }

    function extractBinaryFromImage(imageData, cellSize) {
      const data = imageData.data;
      const width = imageData.width;
      const height = imageData.height;
      const binary = [];

      // Process grid based on cell size
      for (let y = 0; y < height; y += cellSize) {
        for (let x = 0; x < width; x += cellSize) {
          // Get average brightness of cell
          let brightness = 0;
          let count = 0;
          for (let dy = 0; dy < cellSize && y + dy < height; dy++) {
            for (let dx = 0; dx < cellSize && x + dx < width; dx++) {
              const idx = ((y + dy) * width + (x + dx)) * 4;
              const r = data[idx];
              const g = data[idx + 1];
              const b = data[idx + 2];
              brightness += (r + g + b) / 3;
              count++;
            }
          }
          brightness /= count;
          // If darker than midpoint, it's a 1, else 0
          binary.push(brightness < 128 ? '1' : '0');
        }
      }
      return binary.join('');
    }

    function processPhotoCapture() {
      const video = document.getElementById('cameraFeed');
      const canvas = document.getElementById('scanCanvas');
      const ctx = canvas.getContext('2d');
      const scanBinary = document.getElementById('scannedBinary');
      const decodedText = document.getElementById('decodedText');
      const bits = parseInt(document.getElementById('scanBits').value);
      const cellSize = parseInt(document.getElementById('scanCell').value);

      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0);
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const extracted = extractBinaryFromImage(imageData, cellSize);
      
      if (extracted.length > 0) {
        scanBinary.value = extracted;
        const decoded = binaryToText(extracted, bits);
        decodedText.value = decoded || '(no valid text found)';
      }
    }

    document.getElementById('startCamera').addEventListener('click', async () => {
      const cameraContainer = document.getElementById('cameraContainer');
      const video = document.getElementById('cameraFeed');
      const startBtn = document.getElementById('startCamera');
      const captureBtn = document.getElementById('capturePhoto');
      const stopBtn = document.getElementById('stopCamera');

      try {
        videoStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment' }
        });
        video.srcObject = videoStream;
        video.play();
        cameraContainer.style.display = 'block';
        startBtn.style.display = 'none';
        captureBtn.style.display = 'inline-block';
        stopBtn.style.display = 'inline-block';
      } catch (err) {
        alert('Error accessing camera: ' + err.message);
      }
    });

    document.getElementById('capturePhoto').addEventListener('click', () => {
      processPhotoCapture();
    });

    document.getElementById('stopCamera').addEventListener('click', () => {
      const cameraContainer = document.getElementById('cameraContainer');
      const video = document.getElementById('cameraFeed');
      const startBtn = document.getElementById('startCamera');
      const captureBtn = document.getElementById('capturePhoto');
      const stopBtn = document.getElementById('stopCamera');

      if (videoStream) {
        videoStream.getTracks().forEach(track => track.stop());
        videoStream = null;
      }

      video.srcObject = null;
      cameraContainer.style.display = 'none';
      startBtn.style.display = 'inline-block';
      captureBtn.style.display = 'none';
      stopBtn.style.display = 'none';
    });
  </script>
</body>
</html>
