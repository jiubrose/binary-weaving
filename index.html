<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Binary Weaving Generator</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23000'/><rect x='10' y='10' width='35' height='35' fill='%23fff'/><rect x='55' y='10' width='35' height='35' fill='%23000'/><rect x='10' y='55' width='35' height='35' fill='%23000'/><rect x='55' y='55' width='35' height='35' fill='%23fff'/></svg>">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      cursor: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><rect width="32" height="32" fill="%23000"/><rect x="4" y="4" width="12" height="12" fill="%23fff"/><rect x="16" y="4" width="12" height="12" fill="%23000"/><rect x="4" y="16" width="12" height="12" fill="%23000"/><rect x="16" y="16" width="12" height="12" fill="%23fff"/></svg>') 16 16, auto;
    }

    button:hover,
    input:hover,
    textarea:hover,
    select:hover,
    a:hover,
    label:hover {
      cursor: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><rect width="32" height="32" fill="%23fff"/><rect x="4" y="4" width="12" height="12" fill="%23000"/><rect x="16" y="4" width="12" height="12" fill="%23fff"/><rect x="4" y="16" width="12" height="12" fill="%23fff"/><rect x="16" y="16" width="12" height="12" fill="%23000"/></svg>') 16 16, auto;
    }

    body {
      font-family: 'Courier New', 'Courier', monospace;
      padding: 16px;
      max-width: 1000px;
      margin: 0 auto;
      background-color: #000000;
      color: #ffffff;
      line-height: 1.6;
    }

    h2 {
      margin-top: 24px;
      margin-bottom: 16px;
      color: #ffffff;
      font-size: 1.8rem;
      font-weight: bold;
    }

    h2:first-child {
      margin-top: 0;
    }

    p {
      color: #ffffff;
      margin-bottom: 12px;
      font-size: 0.95rem;
    }

    label {
      display: block;
      margin-top: 12px;
      margin-bottom: 6px;
      color: #ffffff;
      font-weight: bold;
      font-size: 0.95rem;
    }

    textarea, input[type="number"], input[type="text"], input[type="file"], select {
      width: 100%;
      padding: 8px 10px;
      border: 2px solid;
      border-color: #dfdfdf #808080 #808080 #dfdfdf;
      background-color: #000;
      color: #ffffff;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      transition: border-color 0.2s;
    }

    textarea:focus, input:focus, select:focus {
      outline: none;
      border-color: #ffffff;
      box-shadow: 0 0 5px rgba(255, 255, 255, 0.3);
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
      margin: 16px 0;
      flex-wrap: wrap;
    }

    .controls label {
      margin-top: 0;
      margin-bottom: 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .controls input[type="number"],
    .controls select {
      flex: 1;
      margin-bottom: 0;
    }

    .controls input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #ffffff;
    }

    button {
      padding: 6px 14px;
      background: linear-gradient(to bottom, #dfdfdf 0%, #808080 100%);
      color: #000;
      border: 2px solid;
      border-color: #ffffff #808080 #808080 #ffffff;
      border-radius: 0;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      font-family: 'Courier New', 'Courier', monospace;
      transition: all 0.1s;
      box-shadow: inset 1px 1px 0 rgba(255, 255, 255, 0.5), inset -1px -1px 0 rgba(0, 0, 0, 0.5);
    }

    button:hover {
      background: linear-gradient(to bottom, #e0e0e0 0%, #909090 100%);
    }

    button:active {
      border-color: #808080 #ffffff #ffffff #808080;
      box-shadow: inset -1px -1px 0 rgba(255, 255, 255, 0.5), inset 1px 1px 0 rgba(0, 0, 0, 0.5);
    }

    button:disabled {
      background: linear-gradient(to bottom, #dfdfdf 0%, #808080 100%);
      color: #808080;
      cursor: not-allowed;
    }

    canvas {
      border: 2px solid;
      border-color: #808080 #dfdfdf #dfdfdf #808080;
      margin-top: 16px;
      image-rendering: pixelated;
      max-width: 100%;
      height: auto;
      display: block;
      background-color: #000;
      box-shadow: inset 1px 1px 0 rgba(0, 0, 0, 0.5);
    }

    video {
      border: 2px solid;
      border-color: #808080 #dfdfdf #dfdfdf #808080;
      max-width: 100%;
      height: auto;
      margin-top: 12px;
      background-color: #000;
      display: block;
      box-shadow: inset 1px 1px 0 rgba(0, 0, 0, 0.5);
    }

    #cameraContainer {
      background: linear-gradient(to bottom, #000080 0%, #1084d7 100%);
      padding: 12px;
      border: 2px solid;
      border-color: #dfdfdf #808080 #808080 #dfdfdf;
      margin-top: 12px;
      box-shadow: inset 1px 1px 0 rgba(255, 255, 255, 0.3);
    }

    .form-group {
      background-color: #c0c0c0;
      padding: 16px;
      border: 2px solid;
      border-color: #dfdfdf #808080 #808080 #dfdfdf;
      margin-bottom: 16px;
      box-shadow: inset 1px 1px 0 rgba(255, 255, 255, 0.5), inset -1px -1px 0 rgba(0, 0, 0, 0.2);
    }

    .form-group:last-child {
      margin-bottom: 0;
    }

    .form-group label {
      color: #000000;
    }

    .form-group p {
      color: #000000;
    }

    hr {
      margin: 32px 0;
      border: none;
      border-top: 2px solid;
      border-color: #dfdfdf #808080 #808080 #dfdfdf;
    }

    .button-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .button-group button {
      flex: 1;
      min-width: 120px;
    }

    @media (max-width: 768px) {
      body {
        padding: 12px;
      }

      h2 {
        font-size: 1.5rem;
        margin-top: 20px;
        margin-bottom: 12px;
      }

      .controls {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .button-group {
        flex-direction: column;
      }

      .button-group button {
        width: 100%;
        min-width: auto;
      }

      label {
        font-size: 0.9rem;
      }

      textarea, input, select {
        font-size: 16px;
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 10px;
      }

      h2 {
        font-size: 1.3rem;
        margin-top: 16px;
        margin-bottom: 10px;
      }

      label {
        font-size: 0.85rem;
      }

      button {
        padding: 5px 10px;
        font-size: 13px;
      }

      textarea {
        min-height: 70px;
        font-size: 13px;
      }

      .controls label {
        flex-direction: column;
        align-items: flex-start;
      }

      .controls input[type="number"],
      .controls select {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <h2>Pattern Generator</h2>
  
  <div class="form-group">
    <label>Message (text only)
      <textarea id="message">Type your message you wish to preserve here...</textarea>
    </label>

    <div class="controls">
      <label style="display: flex; align-items: center; gap: 8px;"></label>
    </div>

    <div class="button-group">
      <button id="gen">Generate</button>
      <button id="download">Download PNG</button>
    </div>
  </div>

  <canvas id="pattern"></canvas>

  <hr>

  <h2>Pattern Scanner</h2>
  <p>Use your device's camera to scan a binary pattern and translate it back to text, or upload an image.</p>
  
  <div class="form-group">
    <div class="controls">
    </div>

    <div class="button-group">
      <button id="startCamera">Start Camera</button>
      <button id="captureAndStop" style="display:none;">Capture & Scan</button>
    </div>

    <div style="margin-top: 12px; padding-top: 12px; border-top: 1px solid #ddd;">
      <label style="display: block; margin-bottom: 8px;">Or upload an image:</label>
      <input type="file" id="imageUpload" accept="image/*" style="display: block; margin-bottom: 8px;">
      <button id="processUploadedImage">Process Image</button>
    </div>
  </div>

  <div id="cameraContainer" style="display:none;">
    <video id="cameraFeed"></video>
    <canvas id="scanCanvas" style="display:none;"></canvas>
  </div>

  <div class="form-group" style="display:none;" id="resultsGroup">
    <label>
      Scanned Binary:
      <textarea id="scannedBinary" readonly style="min-height:60px;"></textarea>
    </label>

    <label>
      Decoded Text:
      <textarea id="decodedText" readonly style="min-height:80px;"></textarea>
    </label>
  </div>

  <script>
    function textToBinary(text, bitsPerChar = 8) {
      const arr = [];
      for (let i = 0; i < text.length; i++) {
        const code = text.charCodeAt(i);
        let b = code.toString(2);
        if (b.length > bitsPerChar) b = b.slice(-bitsPerChar);
        else b = b.padStart(bitsPerChar, '0');
        arr.push(b);
      }
      return arr.join('');
    }

    function chunkString(str, size) {
      const chunks = [];
      for (let i = 0; i < str.length; i += size) chunks.push(str.slice(i, i + size));
      return chunks;
    }

    function renderBinaryGrid(binary, cols, cellSize, invert=false) {
      const rows = Math.ceil(binary.length / cols);
      const canvas = document.getElementById('pattern');
      canvas.width = cols * cellSize;
      
      // Add minimum height on desktop view (> 768px)
      let canvasHeight = rows * cellSize;
      if (window.innerWidth > 768) {
        canvasHeight = Math.max(canvasHeight, 300);
      }
      canvas.height = canvasHeight;
      const ctx = canvas.getContext('2d');

      // Fill background white (or black if invert)
      ctx.fillStyle = invert ? '#fff' : '#fff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (let i = 0; i < binary.length; i++) {
        const bit = binary[i];
        const x = (i % cols) * cellSize;
        const y = Math.floor(i / cols) * cellSize;
        const on = bit === '1';
        // If invert checked, flip color mapping
        ctx.fillStyle = (on ^ invert) ? '#000' : '#fff';
        ctx.fillRect(x, y, cellSize, cellSize);
      }
    }

    document.getElementById('gen').addEventListener('click', () => {
      const msg = document.getElementById('message').value;
      const cell = 16; // Fixed to 16px
      const bits = 8; // Fixed to 8 bits
      const cols = 50; // Fixed to 50 columns

      const binary = textToBinary(msg, bits);
      renderBinaryGrid(binary, cols, cell, false);
    });

    // Re-generate on window resize to adapt to viewport changes
    window.addEventListener('resize', () => {
      const msg = document.getElementById('message').value;
      const cell = 16; // Fixed to 16px
      const bits = 8; // Fixed to 8 bits
      const cols = 50; // Fixed to 50 columns

      const binary = textToBinary(msg, bits);
      renderBinaryGrid(binary, cols, cell, false);
    });

    document.getElementById('download').addEventListener('click', () => {
      const canvas = document.getElementById('pattern');
      const url = canvas.toDataURL('image/png');
      const a = document.createElement('a');
      a.href = url;
      a.download = 'weave.png';
      a.click();
    });

    // auto-generate initial
    document.getElementById('gen').click();

    // ==================== SCANNER SECTION ====================
    let videoStream = null;

    function binaryToText(binary, bitsPerChar = 8) {
      const text = [];
      for (let i = 0; i < binary.length; i += bitsPerChar) {
        const chunk = binary.slice(i, i + bitsPerChar);
        if (chunk.length === bitsPerChar) {
          const code = parseInt(chunk, 2);
          if (code >= 0 && code <= 127) {
            text.push(String.fromCharCode(code));
          }
        }
      }
      return text.join('');
    }

    function extractBinaryFromImage(imageData, cellSize) {
      const data = imageData.data;
      const width = imageData.width;
      const height = imageData.height;
      const cellBrightnesses = [];

      // First pass: collect brightness values for all cells
      for (let y = 0; y < height; y += cellSize) {
        for (let x = 0; x < width; x += cellSize) {
          // Get average brightness of cell
          let brightness = 0;
          let count = 0;
          for (let dy = 0; dy < cellSize && y + dy < height; dy++) {
            for (let dx = 0; dx < cellSize && x + dx < width; dx++) {
              const idx = ((y + dy) * width + (x + dx)) * 4;
              const r = data[idx];
              const g = data[idx + 1];
              const b = data[idx + 2];
              brightness += (r + g + b) / 3;
              count++;
            }
          }
          brightness /= count;
          cellBrightnesses.push(brightness);
        }
      }

      // Calculate adaptive threshold using median and quartiles for better contrast
      cellBrightnesses.sort((a, b) => a - b);
      const mid = Math.floor(cellBrightnesses.length / 2);
      const threshold = cellBrightnesses[mid];

      // Second pass: convert to binary using adaptive threshold
      const binary = [];
      for (let y = 0; y < height; y += cellSize) {
        for (let x = 0; x < width; x += cellSize) {
          let brightness = 0;
          let count = 0;
          for (let dy = 0; dy < cellSize && y + dy < height; dy++) {
            for (let dx = 0; dx < cellSize && x + dx < width; dx++) {
              const idx = ((y + dy) * width + (x + dx)) * 4;
              const r = data[idx];
              const g = data[idx + 1];
              const b = data[idx + 2];
              brightness += (r + g + b) / 3;
              count++;
            }
          }
          brightness /= count;
          // Use adaptive threshold for better detection
          binary.push(brightness < threshold ? '1' : '0');
        }
      }
      return binary.join('');
    }

    function processPhotoCapture() {
      const video = document.getElementById('cameraFeed');
      const canvas = document.getElementById('scanCanvas');
      const ctx = canvas.getContext('2d');
      const scanBinary = document.getElementById('scannedBinary');
      const decodedText = document.getElementById('decodedText');
      const resultsGroup = document.getElementById('resultsGroup');
      const bits = 8; // Fixed to 8 bits
      const cellSize = 16; // Fixed to 16px

      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0);
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const extracted = extractBinaryFromImage(imageData, cellSize);
      
      if (extracted.length > 0) {
        scanBinary.value = extracted;
        const decoded = binaryToText(extracted, bits);
        decodedText.value = decoded || '(no valid text found)';
        resultsGroup.style.display = 'block';
      }

      // Automatically stop camera after capture
      stopCameraStream();
    }

    function stopCameraStream() {
      const cameraContainer = document.getElementById('cameraContainer');
      const video = document.getElementById('cameraFeed');
      const startBtn = document.getElementById('startCamera');
      const captureBtn = document.getElementById('captureAndStop');

      if (videoStream) {
        videoStream.getTracks().forEach(track => track.stop());
        videoStream = null;
      }

      video.srcObject = null;
      cameraContainer.style.display = 'none';
      startBtn.style.display = 'inline-block';
      captureBtn.style.display = 'none';
    }

    document.getElementById('startCamera').addEventListener('click', async () => {
      const cameraContainer = document.getElementById('cameraContainer');
      const video = document.getElementById('cameraFeed');
      const startBtn = document.getElementById('startCamera');
      const captureBtn = document.getElementById('captureAndStop');

      try {
        videoStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment' }
        });
        video.srcObject = videoStream;
        video.play();
        cameraContainer.style.display = 'block';
        startBtn.style.display = 'none';
        captureBtn.style.display = 'inline-block';
      } catch (err) {
        alert('Error accessing camera: ' + err.message);
      }
    });

    document.getElementById('captureAndStop').addEventListener('click', () => {
      processPhotoCapture();
    });

    function processUploadedImage(file) {
      const reader = new FileReader();
      reader.onload = function(e) {
        const img = new Image();
        img.onload = function() {
          const canvas = document.getElementById('scanCanvas');
          const ctx = canvas.getContext('2d');
          const scanBinary = document.getElementById('scannedBinary');
          const decodedText = document.getElementById('decodedText');
          const resultsGroup = document.getElementById('resultsGroup');
          const bits = 8; // Fixed to 8 bits
          const cellSize = 16; // Fixed to 16px

          canvas.width = img.width;
          canvas.height = img.height;
          ctx.drawImage(img, 0, 0);
          const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const extracted = extractBinaryFromImage(imageData, cellSize);
          
          if (extracted.length > 0) {
            scanBinary.value = extracted;
            const decoded = binaryToText(extracted, bits);
            decodedText.value = decoded || '(no valid text found)';
            resultsGroup.style.display = 'block';
          } else {
            alert('No pattern detected. Please try a clearer image.');
          }
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    document.getElementById('imageUpload').addEventListener('change', function(event) {
      const file = event.target.files[0];
      if (file) {
        processUploadedImage(file);
      }
    });

    document.getElementById('processUploadedImage').addEventListener('click', function() {
      const fileInput = document.getElementById('imageUpload');
      if (fileInput.files.length > 0) {
        processUploadedImage(fileInput.files[0]);
      } else {
        alert('Please select an image first.');
      }
    });
  </script>
</body>
</html>
